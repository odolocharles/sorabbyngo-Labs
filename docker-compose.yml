services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sorabbyngo
      POSTGRES_PASSWORD: sorabbyngo
      POSTGRES_DB: novela
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped

  influxdb:
    image: influxdb:2-alpine
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: sorabbyngo
      DOCKER_INFLUXDB_INIT_PASSWORD: sorabbyngo123
      DOCKER_INFLUXDB_INIT_ORG: sorabbyngo
      DOCKER_INFLUXDB_INIT_BUCKET: vitals
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: sorabbyngo-token
    ports:
      - "8086:8086"
    volumes:
      - influxdata:/var/lib/influxdb2
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2-openssl
    volumes:
      - ./infra/mosquitto.conf:/mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"
      - "9001:9001"
    restart: unless-stopped

  novela:
    build: ./novela
    environment:
      DATABASE_URL: postgresql://sorabbyngo:sorabbyngo@postgres:5432/novela
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on:
      - postgres
    ports:
      - "8001:8000"
    restart: unless-stopped

  pulse:
    build: ./pulse
    environment:
      DATABASE_URL: postgresql://sorabbyngo:sorabbyngo@postgres:5432/novela
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: sorabbyngo-token
      INFLUX_ORG: sorabbyngo
      INFLUX_BUCKET: vitals
      AT_API_KEY: ${AT_API_KEY:-sandbox}
      AT_USERNAME: ${AT_USERNAME:-sandbox}
    depends_on:
      - postgres
      - influxdb
    ports:
      - "8002:8000"
    restart: unless-stopped

  karibu:
    build: ./karibu
    environment:
      DATABASE_URL: postgresql://sorabbyngo:sorabbyngo@postgres:5432/novela
    depends_on:
      - postgres
    ports:
      - "8003:8000"
    restart: unless-stopped

  dawa:
    build: ./dawa
    environment:
      DATABASE_URL: postgresql://sorabbyngo:sorabbyngo@postgres:5432/novela
    depends_on:
      - postgres
    ports:
      - "8004:8000"
    restart: unless-stopped

  taifa:
    build: ./taifa
    environment:
      DATABASE_URL: postgresql://sorabbyngo:sorabbyngo@postgres:5432/novela
      DHIS2_BASE_URL: ${DHIS2_BASE_URL:-https://play.dhis2.org/2.39.1}
    depends_on:
      - postgres
    ports:
      - "8005:8000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - novela
      - pulse
      - karibu
      - dawa
      - taifa
    restart: unless-stopped

volumes:
  pgdata:
  influxdata:
