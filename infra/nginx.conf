upstream novela  { server novela:8001; }
upstream pulse   { server pulse:8002; }
upstream karibu  { server karibu:8003; }
upstream dawa    { server dawa:8004; }
upstream taifa   { server taifa:8005; }

server {
    listen 80;
    server_name api.sorabbyngo.io;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    location /novela/ {
        proxy_pass http://novela/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /pulse/ {
        proxy_pass http://pulse/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket for ward vitals
    location /pulse/ws/ {
        proxy_pass http://pulse/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /karibu/ {
        proxy_pass http://karibu/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /dawa/ {
        proxy_pass http://dawa/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /taifa/ {
        proxy_pass http://taifa/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Dashboard SPA
    location / {
        proxy_pass http://dashboard:3000/;
        proxy_set_header Host $host;
    }
}
