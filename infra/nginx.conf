upstream novela  { server novela:8000; }
upstream pulse   { server pulse:8000; }
upstream karibu  { server karibu:8000; }
upstream dawa    { server dawa:8000; }
upstream taifa   { server taifa:8000; }

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;

    location /novela/ {
        proxy_pass http://novela/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /pulse/ {
        proxy_pass http://pulse/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /pulse/ws/ {
        proxy_pass http://pulse/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location /karibu/ {
        proxy_pass http://karibu/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /dawa/ {
        proxy_pass http://dawa/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /taifa/ {
        proxy_pass http://taifa/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        return 200 '{"status":"ok","gateway":"sorabbyngo"}';
        add_header Content-Type application/json;
    }
}
